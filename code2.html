<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list </title>
</head>

<body>
    <!-- ol, ul, dl -->
    <!-- ol (ordered list) -->
    <ol type="I">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>

    <!-- ul (unordered list) -->
    <ul type="circle">
        <li>Item A</li>
        <li>Item B</li>
        <li>Item C</li>
    </ul>

    <!-- dl (definition list) -->
    <dl>
        <dt>Term 1</dt>
        <dd>Definition for Term 1.</dd>

        <dt>Term 2</dt>
        <dd>Definition for Term 2.</dd>
    </dl>
</body>

</html>
