<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>nested list </title>
</head>

<body>
    <!-- nested list -->
    <ul>
        <li>Item 1</li>
        <li>Item 2
            <ol>
                <li>Subitem 1</li>
                <li>Subitem 2</li>
            </ol>

        </li>
        <li>Item 3</li>
    </ul>
</body>
