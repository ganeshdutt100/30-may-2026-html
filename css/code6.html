<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: black;
            color: white;
            padding: 20px;
            padding-bottom: 40px;
            margin: 20px;
            border-radius: 40px;
        }

        .logo {
            /* margin-top: 10px; */
            float: left;
        }

        ul {
            float: left;
            float: right;
        }

        li {
            float: left;
            margin-left: 20px;
            list-style: none;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">LOGO</div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
            <li>Project</li>
        </ul>
    </nav>
</body>

</html>
